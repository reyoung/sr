name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run tests
        run: go test ./...

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos:
          - darwin
          - linux
          - windows
        goarch:
          - amd64
          - arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          binary="sr"
          if [[ "${GOOS}" == "windows" ]]; then
            binary="sr.exe"
          fi

          mkdir -p "dist/sr_${version}_${GOOS}_${GOARCH}"
          go build -trimpath -ldflags="-s -w" -o "dist/sr_${version}_${GOOS}_${GOARCH}/${binary}" .

      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          package="sr_${version}_${{ matrix.goos }}_${{ matrix.goarch }}"
          cd dist
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            zip -r "${package}.zip" "${package}"
          else
            tar -czf "${package}.tar.gz" "${package}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: sr-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          gh release create "${TAG_NAME}" dist/* \
            --title "${TAG_NAME}" \
            --notes "Automated release for ${TAG_NAME}."

      - name: Confirm release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          expected=6
          actual="$(gh release view "${TAG_NAME}" --json assets --jq '.assets | length')"
          if [[ "${actual}" -ne "${expected}" ]]; then
            echo "Expected ${expected} release assets, found ${actual}."
            gh release view "${TAG_NAME}" --json assets --jq '.assets[].name'
            exit 1
          fi

          gh release view "${TAG_NAME}" --json assets --jq '.assets[].name'

  bump-patch-version:
    name: Bump patch version
    needs: release
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ github.token }}

      - name: Bump chart patch version
        shell: bash
        run: |
          set -euo pipefail

          current="$(awk '/^version:/ { print $2; exit }' charts/sr/Chart.yaml)"
          IFS=. read -r major minor patch <<< "${current}"
          next="${major}.${minor}.$((patch + 1))"

          perl -0pi -e "s/^version: \Q${current}\E$/version: ${next}/m; s/^appVersion: \"\Q${current}\E\"$/appVersion: \"${next}\"/m" charts/sr/Chart.yaml

          if git diff --quiet -- charts/sr/Chart.yaml; then
            echo "Chart version is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add charts/sr/Chart.yaml
          git commit -m "Bump patch version to ${next} [skip ci]"
          git push
