apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sr.fullname" . }}
  labels:
    {{- include "sr.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "sr.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sr.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: sr
          image: {{ .Values.image.repository | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - server
            - --key
            - /etc/sr/server.key
            - --listen
            - 0.0.0.0:8080
          ports:
            - name: sr
              containerPort: 8080
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: server-key
              mountPath: /etc/sr
              readOnly: true
      volumes:
        - name: server-key
          secret:
            secretName: {{ include "sr.fullname" . }}-key
            defaultMode: 0440
